<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 560" role="img" aria-labelledby="af-t af-d" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <title id="af-t">Peta arsitektur fisik</title>
  <desc id="af-d">PC admin menjalankan Ganache dan Remix, terhubung via WiFi ke ESP32 gateway yang mendeteksi anomali secara lokal. ESP32 mem-poll dua slave sensor (ID 1 referensi permanen, ID 2 target impersonation) lewat bus RS485. PC penyerang tersambung ke bus melalui adapter USB-RS485 sebagai akses fisik dalam threat model.</desc>
  <defs>
    <marker id="af-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8b949e"/>
    </marker>
    <marker id="af-arr-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#e5484d"/>
    </marker>
  </defs>

  <line x1="320" y1="250" x2="490" y2="250" stroke="#8b949e" stroke-width="2.5"/>
  <line x1="150" y1="250" x2="320" y2="250" stroke="#8b949e" stroke-width="2.5"/>

  <line x1="320" y1="88"  x2="320" y2="126" stroke="#8b949e" stroke-width="2" marker-end="url(#af-arr)"/>
  <line x1="320" y1="190" x2="320" y2="248" stroke="#8b949e" stroke-width="2"/>
  <line x1="155" y1="250" x2="155" y2="282" stroke="#8b949e" stroke-width="2" marker-end="url(#af-arr)"/>
  <line x1="485" y1="250" x2="485" y2="282" stroke="#8b949e" stroke-width="2" marker-end="url(#af-arr)"/>
  <line x1="320" y1="410" x2="320" y2="256" stroke="#e5484d" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#af-arr-red)"/>

  <rect x="190" y="26" width="260" height="62" rx="10" fill="#1f6feb"/>
  <text x="320" y="53" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="600">PC utama (admin)</text>
  <text x="320" y="74" text-anchor="middle" fill="#cfe0ff" font-size="12.5">Ganache blockchain + Remix</text>

  <rect x="190" y="128" width="260" height="62" rx="10" fill="#1a7f5a"/>
  <text x="320" y="155" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="600">ESP32 gateway</text>
  <text x="320" y="176" text-anchor="middle" fill="#bfe9d8" font-size="12.5">Deteksi anomali (lokal)</text>

  <rect x="55"  y="284" width="200" height="62" rx="10" fill="#3d4450"/>
  <text x="155" y="311" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="600">Slave ID 1</text>
  <text x="155" y="331" text-anchor="middle" fill="#b6bfca" font-size="12">Referensi permanen</text>

  <rect x="385" y="284" width="200" height="62" rx="10" fill="#3d4450"/>
  <text x="485" y="311" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="600">Slave ID 2</text>
  <text x="485" y="331" text-anchor="middle" fill="#b6bfca" font-size="12">Target impersonation</text>

  <rect x="180" y="410" width="280" height="62" rx="10" fill="#a12d2d"/>
  <text x="320" y="437" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="600">PC penyerang (attacker)</text>
  <text x="320" y="457" text-anchor="middle" fill="#f0c9c9" font-size="12">USB-RS485 adapter (fisik)</text>

  <rect x="336" y="98"  width="54"  height="20" rx="10" fill="#394150"/>
  <text x="363" y="112" text-anchor="middle" fill="#cdd5df" font-size="11.5">WiFi</text>

  <rect x="150" y="228" width="150" height="20" rx="10" fill="#394150"/>
  <text x="225" y="242" text-anchor="middle" fill="#cdd5df" font-size="11.5">Bus RS485 (A/B)</text>

  <rect x="330" y="366" width="200" height="20" rx="10" fill="#394150"/>
  <text x="430" y="380" text-anchor="middle" fill="#cdd5df" font-size="11.5">Akses fisik (threat model)</text>

  <rect x="20" y="506" width="600" height="36" rx="8" fill="#2d333b"/>
  <text x="320" y="529" text-anchor="middle" fill="#adbac7" font-size="12.5">Scope terkunci: 1 gateway &#8226; 2 slave sensor-only, tanpa aktuator &#8226; Ganache 1-node</text>
</svg>
